<section id="search-section" class="ai-search-section">
<div class="ai-search-shell">
<div class="search-header">
<h2>Beskriv dit drømme hjem, så finder vores ai det til dig.</h2>
<p>
       Beskriv med dine egne ord, hvad du leder efter – fx by, budget, have,
       garage, natur, børneværelser eller kort pendling.
</p>
</div>
<div class="ai-search-card">
<form action="/" method="POST">
<div class="ai-search-box">
<input
           type="text"
           name="dream_home"
           id="dream_home-input"
           class="ai-search-input"
           placeholder='F.eks.: "Villa i Vejle, tæt på skole og indkøb, 3 børneværelser, have, garage..."'
>
<button type="submit" class="ai-search-submit">Find matches</button>
</div>
<button type="button" class="toggle-filters-btn" onclick="toggleFilters()">
         Åbn filtre muligheder
</button>
<div id="filters-panel" class="filters-panel">
<div class="search-card-inner">
<h3 class="filter-title">Vælg dine ønsker</h3>
<div class="checkbox-group">
<label class="feature-pill">
<input type="checkbox" name="wants_garage" {% if user and user.wants_garage %}checked{% endif %}>
<span>Garage</span>
</label>
<label class="feature-pill">
<input type="checkbox" name="wants_garden" {% if user and user.wants_garden %}checked{% endif %}>
<span>Have</span>
</label>
<label class="feature-pill">
<input type="checkbox" name="wants_forest" {% if user and user.wants_forest %}checked{% endif %}>
<span>Tæt på skov</span>
</label>
<label class="feature-pill">
<input type="checkbox" name="wants_commute" {% if user and user.wants_commute %}checked{% endif %}>
<span>Kort pendling</span>
</label>
<label class="feature-pill">
<input type="checkbox" name="wants_family" {% if user and user.wants_family %}checked{% endif %}>
<span>Familievenligt område</span>
</label>
<label class="feature-pill">
<input type="checkbox" name="wants_investment" {% if user and user.wants_investment %}checked{% endif %}>
<span>God investering</span>
</label>
</div>
<div class="search-grid">
<div class="form-field">
<label>By:</label>
<input type="text" name="city" value="{{ user.city if user else '' }}">
</div>
<div class="form-field">
<label>Budget:</label>
<input type="number" name="budget" value="{{ user.budget if user else '' }}">
</div>
<div class="form-field full">
<label>Minimum størrelse (m²):</label>
<input type="number" name="min_size" value="{{ user.min_size if user else '' }}">
</div>
</div>
</div>
</div>
</form>
</div>
</div>
</section>
